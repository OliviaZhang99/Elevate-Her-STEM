  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="nav-inner">
    <a class="logo" href="index.html">Elevate Her STEM <em>| GLOCAL Project</em></a>
    <nav>
      <ul>
        <li><a href="index.html" class="">Home</a></li>
        <li><a href="about.html" class="">About</a></li>
        <li><a href="mission.html" class="">Mission</a></li>
        <li><a href="stories.html" class="">Stories</a></li>
        <li><a href="people.html" class="active">Profiles</a></li>
        <li><a href="contribute.html" class="">Contribute</a></li>
      </ul>
    </nav>
  </div>
</header>
<main>

<section class="page">
  <a href="people.html" class="back-link">← Back to People</a>
  <div class="profile-layout">
    <div class="profile-aside">
      <div class="profile-initials-lg" id="detailInitials">?</div>
      <div class="profile-name" id="detailName">Name</div>
      <div class="profile-role" id="detailRole">Role</div>
      <div class="profile-field" id="detailField">Field</div>
      <div class="tags" id="detailTags"></div>
      <div class="profile-takeaway-label">Main takeaway</div>
      <div class="profile-takeaway" id="detailTakeaway"></div>
    </div>
    <div class="profile-main" id="profileSections"></div>
  </div>
</section>
</main>

<script src="data.js"></script>
<script>
function escapeHTML(value) {
  return String(value || '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[char]));
}
function initials(name) {
  const match = String(name || '').match(/Anonymous Profile\s+(\d+)/i);
  if (match) return match[1];
  const clean = String(name || '').replace(/\([^)]*\)/g, '').replace(/^(Dr\.?|Professor|Prof\.?|Ms\.?|Mrs\.?|Mr\.?)\s+/i, '').trim();
  const parts = clean.split(/\s+/).filter(Boolean);
  return (parts.map(w => w[0]).join('').slice(0,2) || '?').toUpperCase();
}
function makeTag(tag) { return `<span class="tag">${escapeHTML(tag)}</span>`; }
function renderProfile() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const profile = profiles.find(p => p.id === id) || profiles[0];
  if (!profile) return;
  document.title = `${profile.name} | Elevate Her STEM`;
  document.getElementById('detailInitials').textContent = initials(profile.name);
  document.getElementById('detailName').textContent = profile.name;
  document.getElementById('detailRole').textContent = profile.role || '';
  document.getElementById('detailField').textContent = profile.field || '';
  document.getElementById('detailTags').innerHTML = (profile.tags || []).map(makeTag).join('');
  document.getElementById('detailTakeaway').textContent = profile.takeaway || profile.summary || '';
  const sections = (profile.sections || []).filter(section => section && section.text && String(section.text).trim());
  document.getElementById('profileSections').innerHTML = sections.map(section => `
    <div class="profile-section">
      <div class="profile-section-label">${escapeHTML(section.label)}</div>
      <p>${escapeHTML(section.text)}</p>
    </div>`).join('');
}
renderProfile();
</script>

<footer><p>Elevate Her STEM &nbsp;•&nbsp; A student-led GLOCAL project</p></footer>
</body>
</html>
